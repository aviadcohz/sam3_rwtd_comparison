# =============================================================================
# Qwen2SAM v3: Multi-Token Description Architecture
# Training on DeTexture dataset (687 samples: 550 train / 137 val)
# Test on RWTD (227 test)
#
# Key differences from v3.yaml:
#   - Train data: /home/aviad/datasets/ade20k/DeTexture/final (687 transitions)
#   - 80/20 train/val split: 550 train, 137 val
#   - Test data: /home/aviad/RWTD (227 test)
# =============================================================================

model:
  qwen_model: "Qwen/Qwen2.5-VL-3B-Instruct"
  qwen_dtype: "bfloat16"
  gradient_checkpointing: true

  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  lora_target_modules: ["q_proj", "v_proj"]

  # Description projector (per-token MLP)
  desc_projector_hidden: 1024
  max_desc_tokens: 16

  # SAM3 config
  sam3_checkpoint: null
  freeze_decoder_layers: true
  sam3_lr_scale: 1.0

  image_size: 1008

  # Alignment (sentence embedder)
  align_embedder: "sentence"
  align_embed_dim: 768
  align_model_name: "all-mpnet-base-v2"

hires:
  enabled: false
  thin_dim: 32

data:
  data_root: "/home/aviad/datasets/ade20k/DeTexture/final"
  metadata_file: "metadata.json"
  train_size: 550
  val_size: 137
  num_workers: 2
  pin_memory: true
  augmentation: true

  # Eval override: python -m qwen2sam.scripts.evaluate_v3 --data_root /home/aviad/RWTD
  # RWTD uses metadata_phase1.json with train_size=26, test starts at index 26
  eval_data_root: "/home/aviad/RWTD"
  eval_metadata_file: "metadata_phase1.json"
  eval_train_size: 0

  system_prompt: "You are a texture boundary segmentation assistant. Describe each texture using its material, pattern structure, and size or shape features. Focus on what makes each texture visually different from the other. Bracket each texture description with START_SEG and END_SEG markers."
  user_prompt: "Identify the two textures in this image. For each, describe its material, pattern, and distinctive visual features in 5-10 words, then segment them."

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  num_epochs: 50
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 3
  min_lr: 1.0e-6
  max_grad_norm: 1.0

  seg_grad_to_lm: true
  seg_grad_warmup_epochs: 5

loss:
  # Segmentation losses (DETR-style)
  seg_weight: 1.0
  focal_weight: 5.0
  dice_weight: 1.0
  cls_weight: 2.0
  box_l1_weight: 5.0
  box_giou_weight: 2.0
  exclusivity_weight: 0.5

  # Alignment loss with memory bank
  alignment_weight: 1.0
  alignment_temperature: 0.07
  alignment_bank_size: 64

  # LM loss (descriptions are training targets)
  lm_weight: 0.5

amp:
  enabled: true
  dtype: "bfloat16"

checkpoint:
  dir: "checkpoints/v3_detexture"
  save_every_n_epochs: 10
  keep_last_n: 3

logging:
  log_every_n_steps: 5
  vis_every_n_steps: 200
  use_wandb: true
  wandb_project: "qwen2sam-v3"
  wandb_run_name: "v3-detexture-687"
  wandb_group: "v3"
  wandb_tags: ["v3", "detexture", "stage1"]

visualization:
  n_train_samples: 4
  n_val_samples: 4
  cell_size: 280
  every_n_epochs: 10

validation:
  every_n_epochs: 5

seed: 42
